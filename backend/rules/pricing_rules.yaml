# CarFarm v2 — 프라이싱 룰 엔진 설정
# Pricing Rule Engine Configuration
#
# 프라이싱 매니저 제공 업계 룰 기반
# 향후 데이터 검증 결과 반영하여 파라미터 조정 예정

version: "1.1.0"
last_updated: "2026-02-23"
rule_basis: "프라이싱 매니저 제공 업계 룰"


# =================================================================
# 1. 주행거리 감가율
# =================================================================
mileage_depreciation:
  description: "주행거리 1만km당 감가율 (%)"

  # 연식별 기본값 (업계 룰 대비 ~30% 축소 — 실측 데이터 반영)
  default:
    age_2_3:     # 2~3년
      rate_per_10k: 1.4   # 소매가의 1.4%/만km
    age_4_6:     # 4~6년
      rate_per_10k: 1.0   # 소매가의 1.0%/만km
    age_7_9:     # 7~9년
      rate_per_10k: 0.7   # 소매가의 0.7%/만km
    age_10_plus: # 10년+
      rate_per_10k: 0.7   # 2000만원 이상: 0.7%/만km
      flat_per_10k: 7     # 2000만원 미만: 7만원/만km
      price_threshold: 2000  # 만원 미만이면 flat 방식 적용

  # 20만km 천장 효과 — 업계 룰: 증감 미적용
  ceiling:
    enabled: true
    ceiling_km: 200000
    reduction_factor: 0.0  # 완전 정체 (증감 미적용)
    note: "20만km 초과: 증감 미적용 (천장 효과)"


# =================================================================
# 2. 교환/판금 보정
# =================================================================
# 업계 룰: 선형 (1회당 고정 비율)
accident_adjustment:
  description: "교환/판금 1회당 신차대비율 보정"

  exchange:  # X 교환
    rate_per_count: 0.02   # 1회당 2% (업계 3% → 실측 1.7% 반영)

  bodywork:  # W 판금·도색
    # 연식/가격대별 차등 (업계 룰 대비 ~30% 축소)
    tiers:
      - condition: "age < 3 or price >= 2500"
        rate_per_count: 0.014   # 1회당 1.4%
        label: "3년 미만 또는 2500만원 이상"
      - condition: "3 <= age < 7 or 1500 <= price < 2500"
        rate_per_count: 0.01    # 1회당 1.0%
        label: "3~7년 또는 1500~2500만원"
      - condition: "price < 500"
        rate_per_count: 0.0     # 미적용
        label: "500만원 미만: 미적용"
      - condition: "default"
        rate_per_count: 0.007   # 1회당 0.7%
        label: "기타"

  scratch:  # A 긁힘
    rate: 0.0
    note: "별도 보정 없음"


# =================================================================
# 2-1. 부위별 사고 보정 가중치
# =================================================================
part_weight:
  description: "부위별 사고 보정 가중치"

  # 골격(구조) 부위 — 별도 골격사고 룰로 처리, 일반 교환/판금에서는 제외
  structural_parts:
    - FRONT_PANEL
    - FRONT_CROSS_MEMBER
    - FLOOR_PANEL
    - SIDE_MEMBER
    - REAR_CROSS_MEMBER
    - TRUNK_FLOOR_PANEL
    - REAR_PANEL

  # 반구조 부위 (필러) — 교환 시 골격사고로 분류
  semi_structural_parts:
    - LEFT_A_PILLAR
    - RIGHT_A_PILLAR
    - LEFT_B_PILLAR
    - RIGHT_B_PILLAR
    - LEFT_C_PILLAR
    - RIGHT_C_PILLAR

  # 주요 외판 — 가중치 1.5 (일반 대비 50% 높은 감가)
  major_outer:
    parts:
      - HOOD
      - ROOF
      - TRUNK
      - LEFT_FRONT_FENDER
      - RIGHT_FRONT_FENDER
      - LEFT_FRONT_DOOR
      - RIGHT_FRONT_DOOR
      - LEFT_REAR_DOOR
      - RIGHT_REAR_DOOR
      - LEFT_QUARTER_PANEL
      - RIGHT_QUARTER_PANEL
    weight: 1.5

  # 소형 부품 — 가중치 0.3 (감가 미미)
  minor_parts:
    parts:
      - FRONT_BUMPER
      - REAR_BUMPER
      - LEFT_HEADLAMP
      - RIGHT_HEADLAMP
      - LEFT_TAIL_LAMP
      - RIGHT_TAIL_LAMP
      - LEFT_SIDE_MIRROR
      - RIGHT_SIDE_MIRROR
      - WINDSHIELD
      - REAR_WINDSHIELD
      - LEFT_FRONT_WHEEL
      - RIGHT_FRONT_WHEEL
      - LEFT_REAR_WHEEL
      - RIGHT_REAR_WHEEL
    weight: 0.3

  # 기타 부위 — 가중치 1.0 (기본값)
  default_weight: 1.0


# =================================================================
# 2-2. 골격사고 감가
# =================================================================
structural_damage:
  description: "골격사고(C-F등급) 감가율"

  # 교환/용접 = 골격사고 확정 damage types
  severe_damage_types:
    - EXCHANGE
    - PANEL_WELDING
    - BENT

  # 등급별 감가율 (차량가 기준 %)
  grades:
    C:
      min_parts: 1
      rate: 0.15
      label: "C등급 (경미 골격사고)"
    D:
      min_parts: 2
      rate: 0.17
      label: "D등급 (중간 골격사고)"
    E:
      min_parts: 3
      rate: 0.18
      label: "E등급 (중대 골격사고)"
    F:
      min_parts: 5
      rate: 0.20
      label: "F등급 (심각 골격사고)"

  note: "골격사고 감가는 교환/판금 보정과 별도로 추가 적용"


# =================================================================
# 3. 색상 보정
# =================================================================
# 업계 룰: 선호도별 20만원 차등
color_adjustment:
  description: "색상 선호도별 가격 보정 (1단계=20만원)"

  # 대형차 (그랜저, G80 등)
  # 선호순서: 흰색=검정=미색 > 메탈 > 실버 > 원색
  large:
    white: 0        # 1위 (기준)
    black: 0        # 1위 공동
    cream: 0        # 1위 공동: 미색
    gray: -20       # 2위: 메탈
    silver: -40     # 3위: 실버
    other: -60      # 4위: 원색
    note: "대형: 흰색=검정=미색 > 메탈 > 실버 > 원색, 20만원/단계"

  # 일반차 (쏘나타, K5 등)
  # 선호순서: 흰색=미색 > 검정 > 메탈 > 실버 > 원색
  medium:
    white: 0        # 1위 (기준)
    cream: 0        # 1위 공동: 미색 (흰색과 동급)
    black: -20      # 2위
    gray: -40       # 3위: 메탈
    silver: -60     # 4위: 실버
    other: -80      # 5위: 원색
    note: "일반: 흰색=미색 > 검정 > 메탈 > 실버 > 원색"

  # 경차 (모닝, 스파크 등)
  # 선호순서: 흰색 > 미색 > 메탈=실버 > 검정 > 원색
  compact:
    white: 0        # 1위 (기준)
    cream: -20      # 2위: 미색
    gray: -40       # 3위: 메탈
    silver: -40     # 3위 공동: 실버
    black: -60      # 4위: 검정
    other: -80      # 5위: 원색
    note: "경차: 흰색 > 미색 > 메탈=실버 > 검정 > 원색"

  # SUV (싼타페, 쏘렌토 등) — 대형과 유사한 패턴 적용
  suv:
    white: 0
    black: 0
    cream: 0        # 미색: 흰색과 동급
    gray: -20
    silver: -40
    other: -60
    note: "SUV: 대형과 유사한 선호도 적용"

  # 연식 가중치: 오래될수록 색상 영향 감소
  age_weight:
    - max_age: 3
      weight: 1.0
    - max_age: 7
      weight: 0.7
    - max_age: 10
      weight: 0.5
    - max_age: 99
      weight: 0.3


# =================================================================
# 4. 수출/내수
# =================================================================
export_domestic:
  description: "수출/내수 구분"
  default_domestic_only: true
  note: "기본적으로 내수 차량만 검색"


# =================================================================
# 6. 옵션 보정 (v2.4 개선)
# =================================================================
# 항상 옵션 리스트 set 차이로 비교 (같은 옵션 무시, 차이만 적용)
# 출고가-기본가 데이터는 개별 옵션 단가 추정에만 활용
preferred_options:
  description: "옵션 보정: 기본옵션 제외 후 추가옵션 차이만 비교"

  # 선루프만 개별 가산 (만원) — 유일하게 가치 확정 가능한 옵션
  sunroof:
    default: 50
    note: "선루프: 50만원 (업계 합의)"

  # ── 기본옵션 무시 키워드 ──
  # 아래 키워드가 포함된 옵션은 가격 비교에서 제외 (부분 매칭)
  # 대부분의 차량에 기본 장착되어 가치 차이가 없는 항목들
  basic_option_keywords:
    # 안전 기본장비
    - "에어백"
    - "ABS"
    - "ESC"
    - "VDC"
    - "TCS"
    - "차체자세제어"
    - "브레이크"
    - "안전벨트"
    - "이모빌라이저"
    - "타이어공기압"
    - "TPMS"
    # 기본 편의장비
    - "에어컨"
    - "히터"
    - "파워스티어링"
    - "파워윈도우"
    - "파워도어록"
    - "중앙집중"
    - "집중도어잠금"
    - "도어잠금"
    - "리모컨"
    - "키리스"
    - "이모빌"
    - "트립컴퓨터"
    # 기본 외장
    - "안개등"
    - "주간주행등"
    - "DRL"
    - "LED주간"
    - "사이드미러"
    - "와이퍼"
    - "뒷유리열선"
    - "열선"
    # 기본 내장
    - "오디오"
    - "라디오"
    - "USB"
    - "AUX"
    - "블루투스"
    - "스티어링휠"
    - "틸트"
    - "텔레스코픽"
    - "앞좌석"
    - "뒷좌석"
    - "컵홀더"
    - "선바이저"
    - "룸미러"
    - "보조손잡이"


# =================================================================
# 7. 연식 차이 보정
# =================================================================
# 업계 룰: 연당 2% (낙찰가 기준)
year_adjustment:
  description: "연식 차이 보정: 연당 1.4%"
  rate_per_year: 0.014  # 연당 1.4% (업계 2% → 실측 반영 30% 축소)
  note: "대상이 기준보다 오래되면 감가, 새로우면 가산"


# =================================================================
# 8. 브랜드 비선호
# =================================================================
brand_preference:
  description: "브랜드별 잔존가치 차이"

  discount_brands:
    - name: "르노코리아"
      alias: ["르노삼성", "르노", "삼성"]
    - name: "KG모빌리티"
      alias: ["쌍용", "쌍용자동차"]
    - name: "쉐보레"
      alias: ["GM", "한국GM"]

  premium_brands:
    - name: "제네시스"
    - name: "BMW"
    - name: "벤츠"
      alias: ["메르세데스", "메르세데스벤츠"]
    - name: "아우디"


# =================================================================
# 8. 가격 산출 공식
# =================================================================
price_calculation:
  description: "최종 가격 산출 공식"

  # 소매가 = 신차가격 × 보정된 신차대비율
  # 예상 낙찰가 = 소매가 × 경매 할인율
  auction_discount:
    domestic: 0.90      # 국산: 소매가의 90%
    import: 0.88        # 외제차: 88%

  # 최소 마진
  min_margin: 150       # 만원


# =================================================================
# 9. 차종별 특수 룰
# =================================================================
vehicle_specific_rules: {}


# =================================================================
# 메타데이터
# =================================================================
metadata:
  rule_source: "프라이싱 매니저 업계 룰"
  note: "향후 데이터 검증 결과 반영하여 파라미터 조정 예정"

  data_verification_available:
    - "주행거리 감가율 — 실제 1.5~2배 높음"
    - "교환 — 업계 3% vs 실제 1.7%"
    - "색상 — 중형 흰색 최하위 (업계 룰 정반대)"
    - "수출/내수 — 20만km+ 수출 33% 높음"
