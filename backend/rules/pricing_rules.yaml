# CarFarm v2 — 프라이싱 룰 엔진 설정
# Pricing Rule Engine Configuration
#
# 프라이싱 매니저 제공 업계 룰 기반
# 향후 데이터 검증 결과 반영하여 파라미터 조정 예정

version: "1.1.0"
last_updated: "2026-02-23"
rule_basis: "프라이싱 매니저 제공 업계 룰"


# =================================================================
# 1. 주행거리 감가율
# =================================================================
mileage_depreciation:
  description: "주행거리 1만km당 감가율 (%)"

  # 연식별 기본값 (업계 룰)
  default:
    age_2_3:     # 2~3년
      rate_per_10k: 2.0   # 소매가의 2%/만km
    age_4_6:     # 4~6년
      rate_per_10k: 1.5   # 소매가의 1.5%/만km
    age_7_9:     # 7~9년
      rate_per_10k: 1.0   # 소매가의 1%/만km
    age_10_plus: # 10년+
      rate_per_10k: 1.0   # 2000만원 이상: 1%/만km
      flat_per_10k: 10    # 2000만원 미만: 10만원/만km
      price_threshold: 2000  # 만원 미만이면 flat 방식 적용

  # 20만km 천장 효과 — 업계 룰: 증감 미적용
  ceiling:
    enabled: true
    ceiling_km: 200000
    reduction_factor: 0.0  # 완전 정체 (증감 미적용)
    note: "20만km 초과: 증감 미적용 (천장 효과)"


# =================================================================
# 2. 교환/판금 보정
# =================================================================
# 업계 룰: 선형 (1회당 고정 비율)
accident_adjustment:
  description: "교환/판금 1회당 신차대비율 보정"

  exchange:  # X 교환
    rate_per_count: 0.03   # 1회당 3%

  bodywork:  # W 판금·도색
    # 연식/가격대별 차등
    tiers:
      - condition: "age < 3 or price >= 2500"
        rate_per_count: 0.02    # 1회당 2%
        label: "3년 미만 또는 2500만원 이상"
      - condition: "3 <= age < 7 or 1500 <= price < 2500"
        rate_per_count: 0.015   # 1회당 1.5%
        label: "3~7년 또는 1500~2500만원"
      - condition: "price < 500"
        rate_per_count: 0.0     # 미적용
        label: "500만원 미만: 미적용"
      - condition: "default"
        rate_per_count: 0.01    # 1회당 1%
        label: "기타"

  scratch:  # A 긁힘
    rate: 0.0
    note: "별도 보정 없음"


# =================================================================
# 3. 색상 보정
# =================================================================
# 업계 룰: 선호도별 20만원 차등
color_adjustment:
  description: "색상 선호도별 가격 보정 (1단계=20만원)"

  # 대형차 (그랜저, G80 등)
  # 선호순서: 흰색=검정 > 메탈 > 실버 > 원색
  large:
    white: 0        # 1위 (기준)
    black: 0        # 1위 공동
    gray: -20       # 2위: 메탈
    silver: -40     # 3위: 실버
    other: -60      # 4위: 원색
    note: "대형: 흰색=검정 > 메탈 > 실버 > 원색, 20만원/단계"

  # 일반차 (쏘나타, K5 등)
  # 선호순서: 흰색 > 검정 > 메탈 > 실버 > 원색
  medium:
    white: 0        # 1위 (기준)
    black: -20      # 2위
    gray: -40       # 3위: 메탈
    silver: -60     # 4위: 실버
    other: -80      # 5위: 원색
    note: "일반: 흰색 > 검정 > 메탈 > 실버 > 원색"

  # 경차 (모닝, 스파크 등)
  # 선호순서: 흰색 > 미색 > 메탈=실버 > 검정 > 원색
  compact:
    white: 0        # 1위 (기준)
    cream: -20      # 2위: 미색
    gray: -40       # 3위: 메탈
    silver: -40     # 3위 공동: 실버
    black: -60      # 4위: 검정
    other: -80      # 5위: 원색
    note: "경차: 흰색 > 미색 > 메탈=실버 > 검정 > 원색"

  # SUV (싼타페, 쏘렌토 등) — 대형과 유사한 패턴 적용
  suv:
    white: 0
    black: 0
    gray: -20
    silver: -40
    other: -60
    note: "SUV: 대형과 유사한 선호도 적용"

  # 연식 가중치: 오래될수록 색상 영향 감소
  age_weight:
    - max_age: 3
      weight: 1.0
    - max_age: 7
      weight: 0.7
    - max_age: 10
      weight: 0.5
    - max_age: 99
      weight: 0.3


# =================================================================
# 4. 렌터카 감가
# =================================================================
# 업계 룰: 단일 계수
rental_discount:
  description: "렌터카 차량 감가율"
  default_rate: -0.05  # 5% 감가 (업계 일반적 기준)
  note: "렌터카는 자가용 대비 약 5% 감가"


# =================================================================
# 5. 수출/내수
# =================================================================
export_domestic:
  description: "수출/내수 구분"
  default_domestic_only: true
  note: "기본적으로 내수 차량만 검색"


# =================================================================
# 6. 선호옵션 보정 (선스네후)
# =================================================================
# 업계 룰: 선호옵션 1개당 약 50만원
preferred_options:
  description: "선호옵션(선루프/스마트키/네비/후방카메라) 가산"

  # 개별 옵션 가산 (만원) — 업계 기준 50만원 일괄
  sunroof:
    default: 50
    note: "선루프: 50만원"
  smart_key:
    default: 50
    note: "스마트키: 50만원"
  navigation:
    default: 50
    note: "네비게이션: 50만원"
  rear_camera:
    default: 50
    note: "후방카메라: 50만원"


# =================================================================
# 7. 브랜드 비선호
# =================================================================
brand_preference:
  description: "브랜드별 잔존가치 차이"

  discount_brands:
    - name: "르노코리아"
      alias: ["르노삼성", "르노", "삼성"]
    - name: "KG모빌리티"
      alias: ["쌍용", "쌍용자동차"]
    - name: "쉐보레"
      alias: ["GM", "한국GM"]

  premium_brands:
    - name: "제네시스"
    - name: "BMW"
    - name: "벤츠"
      alias: ["메르세데스", "메르세데스벤츠"]
    - name: "아우디"


# =================================================================
# 8. 가격 산출 공식
# =================================================================
price_calculation:
  description: "최종 가격 산출 공식"

  # 소매가 = 신차가격 × 보정된 신차대비율
  # 예상 낙찰가 = 소매가 × 경매 할인율
  auction_discount:
    domestic: 0.90      # 국산: 소매가의 90%
    import: 0.88        # 외제차: 88%

  # 최소 마진
  min_margin: 150       # 만원


# =================================================================
# 9. 차종별 특수 룰
# =================================================================
vehicle_specific_rules:
  스타렉스:
    note: "렌터카=리무진(고급), 자가용=밴(저가). 경력 구분 필수."
    rental_is_premium: true


# =================================================================
# 메타데이터
# =================================================================
metadata:
  rule_source: "프라이싱 매니저 업계 룰"
  note: "향후 데이터 검증 결과 반영하여 파라미터 조정 예정"

  data_verification_available:
    - "주행거리 감가율 — 실제 1.5~2배 높음"
    - "교환 — 업계 3% vs 실제 1.7%"
    - "색상 — 중형 흰색 최하위 (업계 룰 정반대)"
    - "렌터카 — 차종별 -25%~+25% (단일 불가)"
    - "수출/내수 — 20만km+ 수출 33% 높음"
